<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Orders — Mini ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    renderLayout('Purchase Orders', 'purchase_orders');
    let currentPage = 1;
    let currentStatus = '';
    let vendorsList = [];
    let productsList = [];

    init();

    async function init() {
      const token = localStorage.getItem('erp_token');
      const [vRes, pRes] = await Promise.all([
        fetch('/api/vendors?limit=1000', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/products?limit=1000', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
      ]);
      vendorsList = vRes.data || [];
      productsList = pRes.data || [];
      showListView();
      if (getQueryParam('action') === 'new') showCreateForm();
    }

    // --- LIST VIEW ---
    async function showListView() {
      getPageContent().innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex gap-2">
            <input type="text" class="form-control form-control-sm" id="search-input" placeholder="Search order number..." style="width:200px">
            <input type="date" class="form-control form-control-sm" id="from-date" title="From date" style="width:150px">
            <input type="date" class="form-control form-control-sm" id="to-date" title="To date" style="width:150px">
            <button class="btn btn-sm btn-outline-primary" onclick="loadPurchaseOrders()"><i class="bi bi-search"></i></button>
          </div>
          ${hasAccess('Purchase Orders', 'create') ? `<button class="btn btn-primary btn-sm" onclick="showCreateForm()"><i class="bi bi-plus-lg"></i> New Purchase Order</button>` : ''}
        </div>
        <div class="mb-3">
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary active" onclick="filterStatus('')" id="tab-all">All</button>
            <button class="btn btn-outline-danger" onclick="filterStatus('unpaid')" id="tab-unpaid">Unpaid</button>
            <button class="btn btn-outline-warning" onclick="filterStatus('partial')" id="tab-partial">Partial</button>
            <button class="btn btn-outline-success" onclick="filterStatus('paid')" id="tab-paid">Paid</button>
          </div>
        </div>
        <div id="table-area"></div>`;
      document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadPurchaseOrders();
      });
      loadPurchaseOrders();
    }

    function filterStatus(status) {
      currentStatus = status;
      document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + (status || 'all')).classList.add('active');
      loadPurchaseOrders();
    }

    async function loadPurchaseOrders(page = 1) {
      currentPage = page;
      const search = document.getElementById('search-input')?.value || '';
      const fromDate = document.getElementById('from-date')?.value || '';
      const toDate = document.getElementById('to-date')?.value || '';
      const token = localStorage.getItem('erp_token');

      let url = `/api/purchaseOrders?page=${page}&limit=10&search=${encodeURIComponent(search)}`;
      if (currentStatus) url += `&payment_status=${currentStatus}`;
      if (fromDate) url += `&from_date=${fromDate}`;
      if (toDate) url += `&to_date=${toDate}`;

      const response = await fetch(url, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      const area = document.getElementById('table-area');

      if (!response.ok || !res.data.length) {
        area.innerHTML = '<div class="empty-state"><i class="bi bi-cart"></i><p>No purchase orders found</p></div>';
        return;
      }

      let rows = res.data.map(po => `
        <tr>
          <td>${po.id}</td>
          <td><strong>${po.order_number || '-'}</strong></td>
          <td>${po.vendor ? po.vendor.name : '-'}</td>
          <td>${formatDate(po.order_date)}</td>
          <td>${formatCurrency(po.total_amount)}</td>
          <td>${getStatusBadge(po.payment_status)}</td>
          <td>
            <button class="btn btn-outline-info btn-action" onclick="viewPurchaseOrder(${po.id})"><i class="bi bi-eye"></i></button>
            ${hasAccess('Purchase Orders', 'delete') ? `<button class="btn btn-outline-danger btn-action" onclick="deletePurchaseOrder(${po.id})"><i class="bi bi-trash"></i></button>` : ''}
          </td>
        </tr>`).join('');

      area.innerHTML = `
        <div class="data-table">
          <table class="table table-hover">
            <thead><tr><th>#</th><th>Order #</th><th>Vendor</th><th>Date</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="mt-3">${buildPagination(res.total, parseInt(res.page), parseInt(res.limit), 'loadPurchaseOrders')}</div>`;
    }

    // --- CREATE FORM (new purchase order) ---
    function showCreateForm() {
      if (!hasAccess('Purchase Orders', 'create')) { showToast('No permission to create purchase orders', 'error'); return; }
      const vendorOpts = vendorsList.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
      const productOpts = productsList.map(p => `<option value="${p.id}" data-price="${p.purchase_price}">${p.name}</option>`).join('');

      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">New Purchase Order</h5>
        </div>
        <div class="form-card">
          <form onsubmit="createPurchaseOrder(event)">
            <div class="row g-3 mb-4">
              <div class="col-md-4">
                <label class="form-label">Vendor *</label>
                <select class="form-select" id="f-vendor" required>
                  <option value="">Select Vendor</option>${vendorOpts}
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Order Date *</label>
                <input type="date" class="form-control" id="f-date" required value="${new Date().toISOString().split('T')[0]}">
              </div>
            </div>
            <h6 class="fw-bold mb-2">Line Items</h6>
            <table class="table table-sm" id="items-table">
              <thead><tr><th>Product</th><th style="width:100px">Qty</th><th style="width:130px">Price</th><th style="width:120px">GST</th><th style="width:130px">Total</th><th style="width:50px"></th></tr></thead>
              <tbody id="items-body"></tbody>
            </table>
            <button type="button" class="btn btn-outline-secondary btn-sm mb-3" onclick="addItemRow()"><i class="bi bi-plus"></i> Add Item</button>
            <div class="row justify-content-end">
              <div class="col-md-4">
                <table class="table table-sm">
                  <tr><td>Subtotal</td><td class="text-end" id="subtotal-display">${formatCurrency(0)}</td></tr>
                  <tr><td>Tax (GST)</td><td class="text-end" id="gst-display">${formatCurrency(0)}</td></tr>
                  <tr class="fw-bold"><td>Grand Total</td><td class="text-end" id="grand-total">${formatCurrency(0)}</td></tr>
                </table>
              </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Create Order</button>
          </form>
        </div>`;

      window._productOpts = productOpts;
      addItemRow();
    }

    function addItemRow() {

    const rows = document.getElementById('items-body').children;

  const selectedIds = Array.from(rows)
    .map(tr => tr.querySelector('select').value)
    .filter(v => v);

  if (selectedIds.length >= productsList.length) {
    showToast('No more items available', 'error');
    return;
  }


      const tbody = document.getElementById('items-body');
      const idx = tbody.children.length;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><select class="form-select form-select-sm" onchange="onProductChange(this, ${idx})"><option value="">Select</option>${window._productOpts}</select></td>
        <td><input type="number" class="form-control form-control-sm" min="1" value="1" onchange="calcRow(${idx})"></td>
        <td><input type="number" step="0.01" class="form-control form-control-sm" onchange="calcRow(${idx})"></td>
        <td><select class="form-select form-select-sm" onchange="calcRow(${idx})">
          <option value="0">0%</option><option value="5">5%</option><option value="12">12%</option><option value="18" selected>18%</option><option value="28">28%</option>
        </select></td>
        <td class="row-total pt-2">${formatCurrency(0)}</td>
        <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeItemRow(this)"><i class="bi bi-x"></i></button></td>`;
      tbody.appendChild(tr);
    }

    function onProductChange(select, idx) {
      const option = select.options[select.selectedIndex];
      const price = option.dataset.price || 0;
      const tr = document.getElementById('items-body').children[idx];
      tr.querySelectorAll('input')[1].value = price;
      calcRow(idx);

       refreshProductDropdowns();
    }

    function calcRow(idx) {
      const tr = document.getElementById('items-body').children[idx];
      if (!tr) return;
      const inputs = tr.querySelectorAll('input');
      const selects = tr.querySelectorAll('select');
      const qty = parseFloat(inputs[0].value) || 0;
      const price = parseFloat(inputs[1].value) || 0;
      const taxRate = parseFloat(selects[1].value) || 0;
      const lineTotal = qty * price;
      const tax = (lineTotal * taxRate) / 100;
      tr.querySelector('.row-total').textContent = formatCurrency(lineTotal + tax);
      calcTotals();
    }

    function calcTotals() {
      const rows = document.getElementById('items-body').children;
      let subtotal = 0;
      let totalTax = 0;
      for (const tr of rows) {
        const inputs = tr.querySelectorAll('input');
        const selects = tr.querySelectorAll('select');
        const lineTotal = (parseFloat(inputs[0].value) || 0) * (parseFloat(inputs[1].value) || 0);
        const taxRate = parseFloat(selects[1].value) || 0;
        subtotal += lineTotal;
        totalTax += (lineTotal * taxRate) / 100;
      }
      document.getElementById('subtotal-display').textContent = formatCurrency(subtotal);
      document.getElementById('gst-display').textContent = formatCurrency(totalTax);
      document.getElementById('grand-total').textContent = formatCurrency(subtotal + totalTax);
    }

    function removeItemRow(btn) {
  btn.closest('tr').remove();
  calcTotals();
  refreshProductDropdowns();
}


    function refreshProductDropdowns() {
  const rows = document.getElementById('items-body').children;

  const selectedMap = {};

  // collect selected products
  for (const tr of rows) {
    const val = tr.querySelector('select').value;
    if (val) selectedMap[val] = true;
  }

  const remainingProducts = productsList.filter(p => !selectedMap[p.id]);

  for (const tr of rows) {
    const select = tr.querySelector('select');
    const currentVal = select.value;

    const opts = ['<option value="">Select</option>'];

    productsList.forEach(p => {
      const pid = p.id.toString();

      if (!selectedMap[pid] || pid === currentVal) {
        const selected = pid === currentVal ? ' selected' : '';
        opts.push(`<option value="${p.id}" data-price="${p.purchase_price}"${selected}>
          ${p.name}
        </option>`);
      }
    });

    //  important logic
    if (remainingProducts.length === 0 && !currentVal) {
      select.innerHTML = `<option value="">No items available</option>`;
      select.disabled = true;
    } else {
      select.innerHTML = opts.join('');
      select.disabled = false;
    }
  }

  // update global options
  window._productOpts = productsList
    .filter(p => !selectedMap[p.id])
    .map(p => `<option value="${p.id}" data-price="${p.purchase_price}">
      ${p.name}
    </option>`).join('');
}

    // --- CREATE a new purchase order (POST) ---
    async function createPurchaseOrder(e) {
      e.preventDefault();

      // Collect all line items from the table
      const items = [];
      const rows = document.getElementById('items-body').children;
      for (const tr of rows) {
        const selects = tr.querySelectorAll('select');
        const inputs = tr.querySelectorAll('input');
        if (!selects[0].value) continue;
        items.push({
          product_id: parseInt(selects[0].value),
          quantity: parseInt(inputs[0].value),
          price: parseFloat(inputs[1].value),
          tax_rate: parseFloat(selects[1].value) || 0,
        });
      }

      if (!items.length) {
        showToast('Add at least one item', 'error');
        return;
      }

      // check for duplicate products
      // const productIdSet = new Set();
      // for (const item of items) {
      //   if (productIdSet.has(item.product_id)) {
      //     showToast('Duplicate products are not allowed in a single order', 'error');
      //     return;
      //   }
      //   productIdSet.add(item.product_id);
      // }

      const body = {
        vendor_id: parseInt(document.getElementById('f-vendor').value),
        order_date: document.getElementById('f-date').value,
        items,
      };
      const token = localStorage.getItem('erp_token');

      const response = await fetch('/api/purchaseOrders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast(res.msg || 'Order created');
        showListView();
      } else {
        showToast(res.msg || res.message, 'error');
      }
    }

    // --- VIEW a purchase order (read-only detail) ---
    async function viewPurchaseOrder(id) {
      const token = localStorage.getItem('erp_token');

      const response = await fetch(`/api/purchaseOrders/${id}`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (!response.ok) {
        showToast('Not found', 'error');
        return;
      }

      const po = res.data;
      let itemRows = (po.items || []).map((it, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${it.product?.name || it.product_id}</td>
          <td>${it.quantity}</td>
          <td>${formatCurrency(it.price)}</td>
          <td>${it.tax_rate || 0}%</td>
          <td>${formatCurrency(it.tax_amount)}</td>
          <td>${formatCurrency(it.total)}</td>
        </tr>`).join('');

      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3 no-print">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">${po.order_number}</h5>
          ${getStatusBadge(po.payment_status)}
          <button class="btn btn-sm btn-outline-dark ms-auto" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
        </div>
        <div class="form-card" id="print-area">
          <h4 class="print-only text-center mb-3">Purchase Order — ${po.order_number}</h4>
          <div class="row mb-3">
            <div class="col-4"><small class="text-muted">Vendor</small><div class="fw-bold">${po.vendor?.name || '-'}</div></div>
            <div class="col-4"><small class="text-muted">Date</small><div>${formatDate(po.order_date)}</div></div>
            <div class="col-4"><small class="text-muted">Total</small><div class="fw-bold fs-5">${formatCurrency(po.total_amount)}</div></div>
            <div class="col-3"> <small class="text-muted">Payment Status</small><div class="fw-bold "> ${po.payment_status || '-'}</div></div>
          </div>
          <table class="table table-sm">
            <thead><tr><th>#</th><th>Product</th><th>Qty</th><th>Price</th><th>GST</th><th>Tax Amt</th><th>Total</th></tr></thead>
            <tbody>${itemRows}</tbody>
          </table>
          <div class="text-end">
            <div>Subtotal: ${formatCurrency(po.subtotal)}</div>
            <div>Total Tax: ${formatCurrency(po.tax_amount)}</div>
            <div class="fw-bold fs-5">Grand Total: ${formatCurrency(po.total_amount)}</div>
          </div>
        </div>`;
    }

    // --- DELETE a purchase order ---
    async function deletePurchaseOrder(id) {
      if (!hasAccess('Purchase Orders', 'delete')) { showToast('No permission to delete purchase orders', 'error'); return; }
      if (!confirmDelete('purchase order')) return;

      const token = localStorage.getItem('erp_token');
      const response = await fetch(`/api/purchaseOrders/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast('Purchase order deleted');
        loadPurchaseOrders(currentPage);
      } else {
        showToast(res.msg || res.message, 'error');
      }
    }
  </script>
</body>
</html>
