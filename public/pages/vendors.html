<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendors — Mini ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    renderLayout('Vendors', 'vendors');
    let currentPage = 1;

    showListView();
    if (getQueryParam('action') === 'new') showAddForm();

    // --- LIST VIEW ---
    async function showListView() {
      getPageContent().innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex gap-2">
            <input type="text" class="form-control form-control-sm" id="search-input" placeholder="Search vendors..." style="width:250px">
            <button class="btn btn-sm btn-outline-primary" onclick="loadVendors()"><i class="bi bi-search"></i></button>
          </div>
          ${hasAccess('Vendors', 'create') ? `<button class="btn btn-primary btn-sm" onclick="showAddForm()"><i class="bi bi-plus-lg"></i> Add Vendor</button>` : ''}
        </div>
        <div id="table-area"></div>`;
      document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadVendors();
      });
      loadVendors();
    }

    async function loadVendors(page = 1) {
      currentPage = page;
      const search = document.getElementById('search-input')?.value || '';
      const token = localStorage.getItem('erp_token');

      const response = await fetch(`/api/vendors?page=${page}&limit=10&search=${encodeURIComponent(search)}`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      const area = document.getElementById('table-area');

      if (!response.ok || !res.data.length) {
        area.innerHTML = '<div class="empty-state"><i class="bi bi-truck"></i><p>No vendors found</p></div>';
        return;
      }

      let rows = res.data.map(v => `
        <tr>
          <td>${v.id}</td>
          <td><strong>${v.name}</strong></td>
          <td>${v.email || '-'}</td>
          <td>${v.phone || '-'}</td>
          <td>${v.gst_number || '-'}</td>
          <td>${formatCurrency(v.opening_balance)}</td>
          <td>
            <button class="btn btn-outline-info btn-action" onclick="viewOrders(${v.id}, '${v.name}')" title="View Orders"><i class="bi bi-receipt"></i></button>
            ${hasAccess('Vendors', 'update') ? `<button class="btn btn-outline-primary btn-action" onclick="editVendor(${v.id})"><i class="bi bi-pencil"></i></button>` : ''}
            ${hasAccess('Vendors', 'delete') ? `<button class="btn btn-outline-danger btn-action" onclick="deleteVendor(${v.id})"><i class="bi bi-trash"></i></button>` : ''}
          </td>
        </tr>`).join('');

      area.innerHTML = `
        <div class="data-table">
          <table class="table table-hover">
            <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>GST</th><th>Opening Bal.</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="mt-3">${buildPagination(res.total, parseInt(res.page), parseInt(res.limit), 'loadVendors')}</div>`;
    }

    // --- ADD FORM (empty form for new vendor) ---
    function showAddForm() {
      if (!hasAccess('Vendors', 'create')) { showToast('No permission to create vendors', 'error'); return; }
      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">Add Vendor</h5>
        </div>
        <div class="form-card" style="max-width:600px">
          <form onsubmit="addVendor(event)">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name *</label>
                <input type="text" class="form-control" id="f-name" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="f-email">
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" id="f-phone">
              </div>
              <div class="col-md-6">
                <label class="form-label">GST Number</label>
                <input type="text" class="form-control" id="f-gst">
              </div>
              <div class="col-md-6">
                <label class="form-label">Opening Balance</label>
                <input type="number" step="0.01" class="form-control" id="f-balance" value="0">
              </div>
              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" id="f-address" rows="2"></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
              </div>
            </div>
          </form>
        </div>`;
    }

    // --- EDIT FORM (pre-filled form for updating existing vendor) ---
    function showEditForm(data) {
      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">Edit Vendor</h5>
        </div>
        <div class="form-card" style="max-width:600px">
          <form onsubmit="updateVendor(event, ${data.id})">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name *</label>
                <input type="text" class="form-control" id="f-name" required value="${data.name || ''}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="f-email" value="${data.email || ''}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" id="f-phone" value="${data.phone || ''}">
              </div>
              <div class="col-md-6">
                <label class="form-label">GST Number</label>
                <input type="text" class="form-control" id="f-gst" value="${data.gst_number || ''}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Opening Balance</label>
                <input type="number" step="0.01" class="form-control" id="f-balance" value="${data.opening_balance || 0}">
              </div>
              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" id="f-address" rows="2">${data.address || ''}</textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update</button>
              </div>
            </div>
          </form>
        </div>`;
    }

    // --- ADD a new vendor (POST) ---
    async function addVendor(e) {
      e.preventDefault();
      const body = {
        name: document.getElementById('f-name').value,
        email: document.getElementById('f-email').value || null,
        phone: document.getElementById('f-phone').value,
        gst_number: document.getElementById('f-gst').value,
        opening_balance: parseFloat(document.getElementById('f-balance').value) || 0,
        address: document.getElementById('f-address').value,
      };
      const token = localStorage.getItem('erp_token');

      const response = await fetch('/api/vendors', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast(res.message);
        showListView();
      } else {
        showToast(res.message, 'error');
      }
    }

    // --- UPDATE an existing vendor (PUT) ---
    async function updateVendor(e, id) {
      e.preventDefault();
      const body = {
        name: document.getElementById('f-name').value,
        email: document.getElementById('f-email').value || null,
        phone: document.getElementById('f-phone').value,
        gst_number: document.getElementById('f-gst').value,
        opening_balance: parseFloat(document.getElementById('f-balance').value) || 0,
        address: document.getElementById('f-address').value,
      };
      const token = localStorage.getItem('erp_token');

      const response = await fetch(`/api/vendors/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast(res.message);
        showListView();
      } else {
        showToast(res.message, 'error');
      }
    }

    // Load vendor data from server then show the edit form
    async function editVendor(id) {
      if (!hasAccess('Vendors', 'update')) { showToast('No permission to edit vendors', 'error'); return; }
      const token = localStorage.getItem('erp_token');

      const response = await fetch(`/api/vendors/${id}`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showEditForm(res.data);
      } else {
        showToast('Vendor not found', 'error');
      }
    }

    // --- DELETE a vendor ---
    async function deleteVendor(id) {
      if (!hasAccess('Vendors', 'delete')) { showToast('No permission to delete vendors', 'error'); return; }
      if (!confirmDelete('vendor')) return;

      const token = localStorage.getItem('erp_token');
      const response = await fetch(`/api/vendors/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast('Vendor deleted');
        loadVendors(currentPage);
      } else {
        showToast(res.message, 'error');
      }
    }
    // --- VIEW ORDERS for a vendor ---
    async function viewOrders(vendorId, vendorName) {
      const token = localStorage.getItem('erp_token');
      const response = await fetch(`/api/vendors/${vendorId}/orders`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (response.status === 401) { localStorage.removeItem('erp_token'); localStorage.removeItem('erp_user'); window.location.href = 'login.html'; return; }
      const res = await response.json();
      const orders = res.data || [];

      let rows = orders.length ? orders.map(o => `
        <tr>
          <td>${o.id}</td>
          <td><strong>${o.order_number || '-'}</strong></td>
          <td>${formatDate(o.order_date)}</td>
          <td>${formatCurrency(o.subtotal)}</td>
          <td>${formatCurrency(o.tax_amount)}</td>
          <td>${formatCurrency(o.total_amount)}</td>
          <td>${getStatusBadge(o.payment_status)}</td>
        </tr>`).join('') : '<tr><td colspan="7" class="text-center text-muted">No orders found</td></tr>';

      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">Purchase Orders — ${vendorName}</h5>
        </div>
        <div class="data-table">
          <table class="table table-hover">
            <thead><tr><th>#</th><th>Order #</th><th>Date</th><th>Subtotal</th><th>Tax</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }
  </script>
</body>
</html>
