<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Mini ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    renderLayout('Products', 'products');
    let currentPage = 1;
    let categories = [];

    init();

    async function init() {
      const token = localStorage.getItem('erp_token');

      const categoryResponse = await fetch('/api/categories', {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (categoryResponse.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const catRes = await categoryResponse.json();
      categories = categoryResponse.ok ? catRes.data : [];

      showListView();
      if (getQueryParam('action') === 'new') showAddForm();
    }

    // --- LIST VIEW ---
    async function showListView() {
      let catOptions = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      getPageContent().innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex gap-2">
            <input type="text" class="form-control form-control-sm" id="search-input" placeholder="Search products..." style="width:200px">
            <select class="form-select form-select-sm" id="filter-cat" style="width:160px">
              <option value="">All Categories</option>${catOptions}
            </select>
            <button class="btn btn-sm btn-outline-primary" onclick="loadProducts()"><i class="bi bi-search"></i></button>
          </div>
          ${hasAccess('Products', 'create') ? `<button class="btn btn-primary btn-sm" onclick="showAddForm()"><i class="bi bi-plus-lg"></i> Add Product</button>` : ''}
        </div>
        <div id="table-area"></div>`;
      loadProducts();
    }

    async function loadProducts(page = 1) {
      currentPage = page;
      const search = document.getElementById('search-input')?.value || '';
      const cat = document.getElementById('filter-cat')?.value || '';
      const token = localStorage.getItem('erp_token');

      let url = `/api/products?page=${page}&limit=10&search=${encodeURIComponent(search)}`;
      if (cat) url += `&category_id=${cat}`;

      const response = await fetch(url, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      const area = document.getElementById('table-area');

      if (!response.ok || !res.data.length) {
        area.innerHTML = '<div class="empty-state"><i class="bi bi-box"></i><p>No products found</p></div>';
        return;
      }

      let rows = res.data.map(p => `
        <tr>
          <td>${p.id}</td>
          <td><strong>${p.name}</strong></td>
          <td>${p.category?.name || '-'}</td>
          <td>${p.sku}</td>
          <td>${p.description}</td>
          <td>${formatCurrency(p.purchase_price)}</td>
          <td>${formatCurrency(p.sales_price)}</td>
          <td>${p.stock_quantity}</td>
          <td>
            ${hasAccess('Products', 'update') ? `<button class="btn btn-outline-primary btn-action" onclick="editProduct(${p.id})"><i class="bi bi-pencil"></i></button>` : ''}
            ${hasAccess('Products', 'delete') ? `<button class="btn btn-outline-danger btn-action" onclick="deleteProduct(${p.id})"><i class="bi bi-trash"></i></button>` : ''}
          </td>
        </tr>`).join('');

      area.innerHTML = `
        <div class="data-table">
          <table class="table table-hover">
            <thead><tr><th>#</th><th>Name</th><th>Category</th><th>SKU</th><th>Description</th><th>Purchase ₹</th><th>Sales ₹</th><th>Stock</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="mt-3">${buildPagination(res.total, parseInt(res.page), parseInt(res.limit), 'loadProducts')}</div>`;
    }

    // --- ADD FORM (empty form for new product) ---
    function showAddForm() {
      if (!hasAccess('Products', 'create')) { showToast('No permission to create products', 'error'); return; }
      let catOptions = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">Add Product</h5>
        </div>
        <div class="form-card" style="max-width:600px">
          <form onsubmit="addProduct(event)">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Product Name *</label>
                <input type="text" class="form-control" id="f-name" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Category *</label>
                <select class="form-select" id="f-category" required>
                  <option value="">Select</option>${catOptions}
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Purchase Price *</label>
                <input type="number" step="0.01" class="form-control" id="f-pprice" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Sales Price *</label>
                <input type="number" step="0.01" class="form-control" id="f-sprice" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Stock Qty</label>
                <input type="number" class="form-control" id="f-stock" value="0">
              </div>
              <div class="col-md-6">
                <label class="form-label">SKU *</label>
                <input type="text" class="form-control" id="f-sku" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Description *</label>
                <input type="text" class="form-control" id="f-description" required>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
              </div>
            </div>
          </form>
        </div>`;
    }

    // --- EDIT FORM (pre-filled form for updating existing product) ---
    function showEditForm(data) {
      let catOptions = categories.map(c => `<option value="${c.id}" ${data.category_id == c.id ? 'selected' : ''}>${c.name}</option>`).join('');
      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">Edit Product</h5>
        </div>
        <div class="form-card" style="max-width:600px">
          <form onsubmit="updateProduct(event, ${data.id})">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Product Name *</label>
                <input type="text" class="form-control" id="f-name" required value="${data.name || ''}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Category *</label>
                <select class="form-select" id="f-category" required>
                  <option value="">Select</option>${catOptions}
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Purchase Price *</label>
                <input type="number" step="0.01" class="form-control" id="f-pprice" required value="${data.purchase_price || ''}">
              </div>
              <div class="col-md-4">
                <label class="form-label">Sales Price *</label>
                <input type="number" step="0.01" class="form-control" id="f-sprice" required value="${data.sales_price || ''}">
              </div>
              <div class="col-md-4">
                <label class="form-label">Stock Qty</label>
                <input type="number" class="form-control" id="f-stock" value="${data.stock_quantity || 0}" readonly>
              </div>
              <div class="col-md-6">
                <label class="form-label">SKU *</label>
                <input type="text" class="form-control" id="f-sku" required value="${data.sku || ''}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Description *</label>
                <input type="text" class="form-control" id="f-description" required value="${data.description || ''}">
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update</button>
              </div>
            </div>
          </form>
        </div>`;
    }

    // --- ADD a new product (POST) ---
    async function addProduct(e) {
      e.preventDefault();
      const body = {
        name: document.getElementById('f-name').value,
        category_id: parseInt(document.getElementById('f-category').value),
        purchase_price: parseFloat(document.getElementById('f-pprice').value),
        sales_price: parseFloat(document.getElementById('f-sprice').value),
        stock_quantity: parseInt(document.getElementById('f-stock').value) || 0,
        sku: document.getElementById('f-sku').value,
        description: document.getElementById('f-description').value,
      };
      const token = localStorage.getItem('erp_token');

      const response = await fetch('/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast(res.message);
        showListView();
      } else {
        showToast(res.message || res.errors?.join(', '), 'error');
      }
    }

    // --- UPDATE an existing product (PUT) ---
    async function updateProduct(e, id) {
      e.preventDefault();
      const body = {
        name: document.getElementById('f-name').value,
        category_id: parseInt(document.getElementById('f-category').value),
        purchase_price: parseFloat(document.getElementById('f-pprice').value),
        sales_price: parseFloat(document.getElementById('f-sprice').value),
        stock_quantity: parseInt(document.getElementById('f-stock').value) || 0,
        sku: document.getElementById('f-sku').value,
        description: document.getElementById('f-description').value,
      };
      const token = localStorage.getItem('erp_token');

      const response = await fetch(`/api/products/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast(res.message);
        showListView();
      } else {
        showToast(res.message || res.errors?.join(', '), 'error');
      }
    }

    // Load product data from server then show the edit form
    async function editProduct(id) {
      if (!hasAccess('Products', 'update')) { showToast('No permission to edit products', 'error'); return; }
      const token = localStorage.getItem('erp_token');

      const response = await fetch(`/api/products/${id}`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showEditForm(res.data);
      }
    }

    // --- DELETE a product ---
    async function deleteProduct(id) {
      if (!hasAccess('Products', 'delete')) { showToast('No permission to delete products', 'error'); return; }
      if (!confirmDelete('product')) return;

      const token = localStorage.getItem('erp_token');
      const response = await fetch(`/api/products/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast('Product deleted');
        loadProducts(currentPage);
      } else {
        showToast(res.message, 'error');
      }
    }
  </script>
</body>
</html>
