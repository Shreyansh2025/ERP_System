<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Payments — Mini ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    renderLayout('Customer Payments (Inward)', 'customer_payments');
    let customersList = [];

    init();

    async function init() {
      const token = localStorage.getItem('erp_token');
      const cRes = await fetch('/api/customers?limit=1000', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json());
      customersList = cRes.data || [];
      showListView();
      if (getQueryParam('action') === 'new') showRecordForm();
    }

    // --- LIST VIEW ---
    async function showListView() {
      getPageContent().innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex gap-2">
            <input type="text" class="form-control form-control-sm" id="search-input" placeholder="Search customer or order..." style="width:200px">
            <input type="date" class="form-control form-control-sm" id="from-date" title="From date" style="width:150px">
            <input type="date" class="form-control form-control-sm" id="to-date" title="To date" style="width:150px">
            <button class="btn btn-sm btn-outline-primary" onclick="loadPayments()"><i class="bi bi-search"></i></button>
          </div>
          ${hasAccess('Customer Payments', 'create') ? `<button class="btn btn-success btn-sm" onclick="showRecordForm()"><i class="bi bi-plus-lg"></i> Record Payment</button>` : ''}
        </div>
        <div id="table-area"></div>`;
      document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadPayments();
      });
      loadPayments();
    }

    async function loadPayments(page = 1) {
      const search = document.getElementById('search-input')?.value || '';
      const fromDate = document.getElementById('from-date')?.value || '';
      const toDate = document.getElementById('to-date')?.value || '';
      const token = localStorage.getItem('erp_token');

      let url = `/api/customer-payments?page=${page}&limit=10`;
      if (search) url += `&search=${encodeURIComponent(search)}`;
      if (fromDate) url += `&from_date=${fromDate}`;
      if (toDate) url += `&to_date=${toDate}`;

      const response = await fetch(url, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      const area = document.getElementById('table-area');

      if (!response.ok || !res.data.length) {
        area.innerHTML = '<div class="empty-state"><i class="bi bi-cash-stack"></i><p>No payments recorded</p></div>';
        return;
      }

      let rows = res.data.map(p => `
        <tr>
          <td>${p.id}</td>
          <td>${p.customer?.name || '-'}</td>
          <td>${p.salesOrder?.order_number || '-'}</td>
          <td class="text-success fw-bold">${formatCurrency(p.amount)}</td>
          <td><span class="badge bg-secondary">${p.payment_mode}</span></td>
          <td>${formatDate(p.payment_date)}</td>
        </tr>`).join('');

      area.innerHTML = `
        <div class="data-table">
          <table class="table table-hover">
            <thead><tr><th>#</th><th>Customer</th><th>Sales Order</th><th>Amount</th><th>Mode</th><th>Date</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="mt-3">${buildPagination(res.total, parseInt(res.page), parseInt(res.limit), 'loadPayments')}</div>`;
    }

    // --- RECORD FORM (form to record a new payment) ---
    function showRecordForm() {
      if (!hasAccess('Customer Payments', 'create')) { showToast('No permission to record customer payments', 'error'); return; }
      let custOpts = customersList.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">Record Customer Payment</h5>
        </div>
        <div class="form-card" style="max-width:500px">
          <form onsubmit="recordPayment(event)">
            <div class="mb-3">
              <label class="form-label">Customer *</label>
              <select class="form-select" id="f-customer" required onchange="loadCustomerOrders()">
                <option value="">Select</option>${custOpts}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Sales Order *</label>
              <select class="form-select" id="f-order" required onchange="loadOrderSummary()">
                <option value="">Select customer first</option>
              </select>
              <div id="order-info" class="mt-2"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Amount *</label>
              <input type="number" step="0.01" class="form-control" id="f-amount" required min="0.01">
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label">Payment Mode *</label>
                <select class="form-select" id="f-mode">
                  <option value="cash">Cash</option>
                  <option value="bank">Bank</option>
                  <option value="upi">UPI</option>
                  <option value="cheque">Cheque</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Payment Date *</label>
                <input type="date" class="form-control" id="f-date" required value="${new Date().toISOString().split('T')[0]}">
              </div>
            </div>
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Record Payment</button>
          </form>
        </div>`;
    }

    async function loadCustomerOrders() {
      const custId = document.getElementById('f-customer').value;
      if (!custId) return;

      const token = localStorage.getItem('erp_token');
      const response = await fetch(`/api/salesOrders?customer_id=${custId}&limit=100`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const res = await response.json();

      // Only show orders that are not fully paid
      const orders = (res.data || []).filter(o => o.payment_status !== 'paid');
      const sel = document.getElementById('f-order');
      sel.innerHTML = '<option value="">Select Order</option>' + orders.map(o =>
        `<option value="${o.id}" data-total="${o.total_amount}">${o.order_number} — ${formatCurrency(o.total_amount)} (${o.payment_status})</option>`
      ).join('');
      document.getElementById('order-info').innerHTML = '';
    }

    async function loadOrderSummary() {
      const orderId = document.getElementById('f-order').value;
      const infoDiv = document.getElementById('order-info');
      if (!orderId) {
        infoDiv.innerHTML = '';
        return;
      }

      const token = localStorage.getItem('erp_token');
      const response = await fetch(`/api/customer-payments/summary/${orderId}`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await response.json();

      if (!response.ok) {
        infoDiv.innerHTML = '';
        return;
      }

      infoDiv.innerHTML = `
        <div class="alert alert-light border p-2 mb-0">
          <div class="d-flex justify-content-between"><span>Order Total:</span><strong>${formatCurrency(data.total_amount)}</strong></div>
          <div class="d-flex justify-content-between"><span>Already Paid:</span><strong class="text-success">${formatCurrency(data.total_paid)}</strong></div>
          <div class="d-flex justify-content-between"><span>Remaining:</span><strong class="text-danger">${formatCurrency(data.remaining)}</strong></div>
        </div>`;
    }

    // --- RECORD a new payment (POST) ---
    async function recordPayment(e) {
      e.preventDefault();
      if (!hasAccess('Customer Payments', 'create')) { showToast('No permission to record customer payments', 'error'); return; }
      const body = {
        customer_id: parseInt(document.getElementById('f-customer').value),
        sales_order_id: parseInt(document.getElementById('f-order').value),
        amount: parseFloat(document.getElementById('f-amount').value),
        payment_mode: document.getElementById('f-mode').value,
        payment_date: document.getElementById('f-date').value,
      };
      const token = localStorage.getItem('erp_token');

      const response = await fetch('/api/customer-payments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast('Payment recorded!');
        showListView();
      } else {
        showToast(res.msg || res.message, 'error');
      }
    }
  </script>
</body>
</html>
