<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Orders — Mini ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    renderLayout('Sales Orders', 'sales_orders');
    let currentPage = 1;
    let currentStatus = '';
    let customersList = [];
    let productsList = [];

    init();

    async function init() {
      const token = localStorage.getItem('erp_token');
      const [cRes, pRes] = await Promise.all([
        fetch('/api/customers?limit=1000', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
        fetch('/api/products?limit=1000', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
      ]);
      customersList = cRes.data || [];
      productsList = pRes.data || [];
      showListView();
      if (getQueryParam('action') === 'new') showCreateForm();
    }

    // --- LIST VIEW ---
    async function showListView() {
      getPageContent().innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex gap-2">
            <input type="text" class="form-control form-control-sm" id="search-input" placeholder="Search order number..." style="width:200px">
            <input type="date" class="form-control form-control-sm" id="from-date" title="From date" style="width:150px">
            <input type="date" class="form-control form-control-sm" id="to-date" title="To date" style="width:150px">
            <button class="btn btn-sm btn-outline-primary" onclick="loadSalesOrders()"><i class="bi bi-search"></i></button>
          </div>
          ${hasAccess('Sales Orders', 'create') ? `<button class="btn btn-primary btn-sm" onclick="showCreateForm()"><i class="bi bi-plus-lg"></i> New Sales Order</button>` : ''}
        </div>
        <div class="mb-3">
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary active" onclick="filterStatus('')" id="tab-all">All</button>
            <button class="btn btn-outline-danger" onclick="filterStatus('unpaid')" id="tab-unpaid">Unpaid</button>
            <button class="btn btn-outline-warning" onclick="filterStatus('partial')" id="tab-partial">Partial</button>
            <button class="btn btn-outline-success" onclick="filterStatus('paid')" id="tab-paid">Paid</button>
          </div>
        </div>
        <div id="table-area"></div>`;
      document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadSalesOrders();
      });
      loadSalesOrders();
    }

    function filterStatus(status) {
      currentStatus = status;
      document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + (status || 'all')).classList.add('active');
      loadSalesOrders();
    }

    async function loadSalesOrders(page = 1) {
      currentPage = page;
      const search = document.getElementById('search-input')?.value || '';
      const fromDate = document.getElementById('from-date')?.value || '';
      const toDate = document.getElementById('to-date')?.value || '';
      const token = localStorage.getItem('erp_token');

      let url = `/api/salesOrders?page=${page}&limit=10&search=${encodeURIComponent(search)}`;
      if (currentStatus) url += `&payment_status=${currentStatus}`;
      if (fromDate) url += `&from_date=${fromDate}`;
      if (toDate) url += `&to_date=${toDate}`;

      const response = await fetch(url, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      const area = document.getElementById('table-area');

      if (!response.ok || !res.data.length) {
        area.innerHTML = '<div class="empty-state"><i class="bi bi-receipt"></i><p>No sales orders found</p></div>';
        return;
      }

      let rows = res.data.map(so => `
        <tr>
          <td>${so.id}</td>
          <td><strong>${so.order_number || '-'}</strong></td>
          <td>${so.customer ? so.customer.name : '-'}</td>
          <td>${formatDate(so.order_date)}</td>
          <td>${formatCurrency(so.total_amount)}</td>
          <td>${getStatusBadge(so.payment_status)}</td>
          <td>
            <button class="btn btn-outline-info btn-action" onclick="viewSalesOrder(${so.id})"><i class="bi bi-eye"></i></button>
            ${hasAccess('Sales Orders', 'delete') ? `<button class="btn btn-outline-danger btn-action" onclick="deleteSalesOrder(${so.id})"><i class="bi bi-trash"></i></button>` : ''}
          </td>
        </tr>`).join('');

      area.innerHTML = `
        <div class="data-table">
          <table class="table table-hover">
            <thead><tr><th>#</th><th>Order #</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="mt-3">${buildPagination(res.total, parseInt(res.page), parseInt(res.limit), 'loadSalesOrders')}</div>`;
    }

    // --- CREATE FORM (new sales order) ---
    function showCreateForm() {
      if (!hasAccess('Sales Orders', 'create')) { showToast('No permission to create sales orders', 'error'); return; }
      const customerOpts = customersList.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      const productOpts = productsList.map(p => `<option value="${p.id}" data-price="${p.sales_price}">${p.name}</option>`).join('');
      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">New Sales Order</h5>
        </div>
        <div class="form-card">
          <form onsubmit="createSalesOrder(event)">
            <div class="row g-3 mb-4">
              <div class="col-md-4">
                <label class="form-label">Customer *</label>
                <select class="form-select" id="f-customer" required>
                  <option value="">Select Customer</option>${customerOpts}
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Order Date *</label>
                <input type="date" class="form-control" id="f-date" required value="${new Date().toISOString().split('T')[0]}">
              </div>
            </div>
            <h6 class="fw-bold mb-2">Line Items</h6>
            <table class="table table-sm" id="items-table">
              <thead><tr><th>Product</th><th style="width:100px">Qty</th><th style="width:130px">Price</th><th style="width:120px">GST</th><th style="width:130px">Total</th><th style="width:50px"></th></tr></thead>
              <tbody id="items-body"></tbody>
            </table>
            <button type="button" class="btn btn-outline-secondary btn-sm mb-3" onclick="addItemRow()"><i class="bi bi-plus"></i> Add Item</button>
            <div class="row justify-content-end">
              <div class="col-md-4">
                <table class="table table-sm">
                  <tr><td>Subtotal</td><td class="text-end" id="subtotal-display">${formatCurrency(0)}</td></tr>
                  <tr><td>Tax (GST)</td><td class="text-end" id="gst-display">${formatCurrency(0)}</td></tr>
                  <tr class="fw-bold"><td>Grand Total</td><td class="text-end" id="grand-total">${formatCurrency(0)}</td></tr>
                </table>
              </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Create Order</button>
          </form>
        </div>`;

      window._productOpts = productOpts;
      addItemRow();
    }

   function addItemRow() {
  const rows = document.getElementById('items-body').querySelectorAll('tr');

  const selectedIds = Array.from(rows)
    .map(tr => tr.querySelector('.product-select').value)
    .filter(v => v);

  //  STOP adding if all products used
  if (selectedIds.length >= productsList.length) {
    showToast('No more items available', 'error');
    return;
  }

  const tbody = document.getElementById('items-body');
  const tr = document.createElement('tr');

  tr.innerHTML = `
    <td>
      <select class="form-select form-select-sm product-select" onchange="onProductChange(this)">
        <option value="">Select</option>${window._productOpts}
      </select>
    </td>
    <td><input type="number" class="form-control form-control-sm qty-input" min="1" value="1" onchange="calcRowFromEl(this)"></td>
    <td><input type="number" step="0.01" class="form-control form-control-sm price-input" onchange="calcRowFromEl(this)"></td>
    <td>
      <select class="form-select form-select-sm tax-select" onchange="calcRowFromEl(this)">
        <option value="0">0%</option>
        <option value="5">5%</option>
        <option value="12">12%</option>
        <option value="18" selected>18%</option>
        <option value="28">28%</option>
      </select>
    </td>
    <td class="row-total pt-2">${formatCurrency(0)}</td>
    <td>
      <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeItemRow(this)">
        <i class="bi bi-x"></i>
      </button>
    </td>
  `;

  tbody.appendChild(tr);
}

    function removeItemRow(btn) {
      btn.closest('tr').remove();
      calcTotals();
      refreshProductDropdowns();
    }

    function onProductChange(select) {
      const option = select.options[select.selectedIndex];
      const price = option.dataset.price || 0;
      const tr = select.closest('tr');
      tr.querySelector('.price-input').value = price;
      calcRowFromEl(select);
      refreshProductDropdowns();
    }

    function calcRowFromEl(el) {
      const tr = el.closest('tr');
      if (!tr) return;
      const qty = parseFloat(tr.querySelector('.qty-input').value) || 0;
      const price = parseFloat(tr.querySelector('.price-input').value) || 0;
      const taxRate = parseFloat(tr.querySelector('.tax-select').value) || 0;
      const lineTotal = qty * price;
      const tax = (lineTotal * taxRate) / 100;
      tr.querySelector('.row-total').textContent = formatCurrency(lineTotal + tax);
      calcTotals();
    }

    function refreshProductDropdowns() {
  const rows = document.getElementById('items-body').querySelectorAll('tr');

  const selectedMap = {};

  // Step 1: collect selected products
  rows.forEach(tr => {
    const val = tr.querySelector('.product-select').value;
    if (val) selectedMap[val] = true;
  });

  // Step 2: check remaining products
  const remainingProducts = productsList.filter(p => !selectedMap[p.id]);

  rows.forEach(tr => {
    const sel = tr.querySelector('.product-select');
    const currentVal = sel.value;

    const opts = ['<option value="">Select</option>'];

    productsList.forEach(p => {
      const pid = p.id.toString();

      if (!selectedMap[pid] || pid === currentVal) {
        const selected = pid === currentVal ? ' selected' : '';
        opts.push(`<option value="${p.id}" data-price="${p.sales_price}"${selected}>${p.name} </option>`);
      }
    });

    //  MAIN LOGIC
    if (remainingProducts.length === 0 && !currentVal) {
      sel.innerHTML = `<option value="">No items available</option>`;
      sel.disabled = true;

      // Optional toast
      showToast('All products already selected', 'error');
    } else {
      sel.innerHTML = opts.join('');
      sel.disabled = false;
    }
  });

  // Update global dropdown options
  window._productOpts = productsList
    .filter(p => !selectedMap[p.id])
    .map(p => `<option value="${p.id}" data-price="${p.sales_price}"> ${p.name}</option>`).join('');
}
    function calcTotals() {
      const rows = document.getElementById('items-body').querySelectorAll('tr');
      let subtotal = 0;
      let totalTax = 0;

      for (const tr of rows) {
        const qty = parseFloat(tr.querySelector('.qty-input')?.value) || 0;
        const price = parseFloat(tr.querySelector('.price-input')?.value) || 0;
        const taxRate = parseFloat(tr.querySelector('.tax-select')?.value) || 0;
        const lineTotal = qty * price;
        subtotal += lineTotal;
        totalTax += (lineTotal * taxRate) / 100;
      }

      document.getElementById('subtotal-display').textContent = formatCurrency(subtotal);
      document.getElementById('gst-display').textContent = formatCurrency(totalTax);
      document.getElementById('grand-total').textContent = formatCurrency(subtotal + totalTax);
    }

    //CREATE a new sales order
    async function createSalesOrder(e) {
      e.preventDefault();

      // Collect all line items from the table
      const items = [];
      const rows = document.getElementById('items-body').querySelectorAll('tr');
      for (const tr of rows) {
        const productVal = tr.querySelector('.product-select')?.value;
        if (!productVal) continue;
        items.push({
          product_id: parseInt(productVal),
          quantity: parseInt(tr.querySelector('.qty-input')?.value) || 0,
          price: parseFloat(tr.querySelector('.price-input')?.value) || 0,
          tax_rate: parseFloat(tr.querySelector('.tax-select')?.value) || 0,
        });
      }

      if (!items.length) {
        showToast('Add at least one item', 'error');
        return;
      }

      // check for duplicate products
      const productIdSet = new Set();
      for (const item of items) {
        if (productIdSet.has(item.product_id)) {
          showToast('Duplicate products are not allowed in a single order', 'error');
          return;
        }
        productIdSet.add(item.product_id);
      }

      const body = {
        customer_id: parseInt(document.getElementById('f-customer').value),
        order_date: document.getElementById('f-date').value,
        items,
      };
      const token = localStorage.getItem('erp_token');

      const response = await fetch('/api/salesOrders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast(res.msg || 'Order created');
        showListView();
      } else {
        showToast(res.msg || res.message, 'error');
      }
    }

    // --- VIEW a sales order (read-only detail) ---
    async function viewSalesOrder(id) {
      const token = localStorage.getItem('erp_token');

      const response = await fetch(`/api/salesOrders/${id}`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (!response.ok) {
        showToast('Not found', 'error');
        return;
      }

      const so = res.data;
      let itemRows = (so.items || []).map((it, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${it.product?.name || it.product_id}</td>
          <td>${it.quantity}</td>
          <td>${formatCurrency(it.price)}</td>
          <td>${it.tax_rate || 0}%</td>
          <td>${formatCurrency(it.tax_amount)}</td>
          <td>${formatCurrency(it.total)}</td>
        </tr>`).join('');

      getPageContent().innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3 no-print">
          <button class="btn btn-sm btn-outline-secondary" onclick="showListView()"><i class="bi bi-arrow-left"></i> Back</button>
          <h5 class="mb-0">${so.order_number}</h5>
          ${getStatusBadge(so.payment_status)}
          <button class="btn btn-sm btn-outline-dark ms-auto" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
        </div>
        <div class="form-card" id="print-area">
          <h4 class="print-only text-center mb-3">Sales Order — ${so.order_number}</h4>
          <div class="row mb-3">
            <div class="col-4"><small class="text-muted">Customer</small><div class="fw-bold">${so.customer?.name || '-'}</div></div>
            <div class="col-4"><small class="text-muted">Date</small><div>${formatDate(so.order_date)}</div></div>
            <div class="col-4"><small class="text-muted">Total</small><div class="fw-bold fs-5">${formatCurrency(so.total_amount)}</div></div>
            <div class="col-3"> <small class="text-muted">Payment Status</small><div class="fw-bold "> ${so.payment_status || '-'}</div></div>
          </div>
          <table class="table table-sm">
            <thead><tr><th>#</th><th>Product</th><th>Qty</th><th>Price</th><th>GST</th><th>Tax Amt</th><th>Total</th></tr></thead>
            <tbody>${itemRows}</tbody>
          </table>
          <div class="text-end">
            <div>Subtotal: ${formatCurrency(so.subtotal)}</div>
            <div>Total Tax: ${formatCurrency(so.tax_amount)}</div>
            <div class="fw-bold fs-5">Grand Total: ${formatCurrency(so.total_amount)}</div>
          </div>
        </div>`;
    }

    // --- DELETE a sales order ---
    async function deleteSalesOrder(id) {
      if (!hasAccess('Sales Orders', 'delete')) { showToast('No permission to delete sales orders', 'error'); return; }
      if (!confirmDelete('sales order')) return;

      const token = localStorage.getItem('erp_token');
      const response = await fetch(`/api/salesOrders/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const res = await response.json();
      if (response.ok) {
        showToast('Sales order deleted');
        loadSalesOrders(currentPage);
      } else {
        showToast(res.msg || res.message, 'error');
      }
    }
  </script>
</body>
</html>
