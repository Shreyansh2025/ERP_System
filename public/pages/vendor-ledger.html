<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Ledger — Mini ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    renderLayout('Vendor Ledger', 'vendor_ledger');
    let vendorsList = [];

    init();

    async function init() {
      const token = localStorage.getItem('erp_token');
      const res = await fetch('/api/vendors?limit=1000', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json());
      vendorsList = res.data || [];
      showView();
    }

    function showView() {
      const vendOpts = vendorsList.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
      getPageContent().innerHTML = `
        <div class="d-flex gap-2 mb-3">
          <select class="form-select" id="f-vendor" style="max-width:320px" onchange="loadLedger()">
            <option value="">— Select Vendor —</option>${vendOpts}
          </select>
        </div>
        <div id="ledger-area"></div>`;
    }

    async function loadLedger() {
      const vendId = document.getElementById('f-vendor').value;
      const area = document.getElementById('ledger-area');
      if (!vendId) { area.innerHTML = ''; return; }

      const token = localStorage.getItem('erp_token');
      const response = await fetch(`/api/vendors/${vendId}/ledger`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        localStorage.removeItem('erp_token');
        localStorage.removeItem('erp_user');
        window.location.href = 'login.html';
        return;
      }

      const data = await response.json();
      if (!response.ok) {
        area.innerHTML = '<div class="alert alert-danger">Failed to load ledger</div>';
        return;
      }

      if (!data.transactions.length) {
        area.innerHTML = `
          <div class="form-card">
            <p class="text-muted mb-0">No transactions found for <strong>${data.vendor.name}</strong>.</p>
          </div>`;
        return;
      }

      const rows = data.transactions.map(t => `
        <tr>
          <td>${formatDate(t.date)}</td>
          <td><span class="badge ${t.type === 'order' ? 'bg-warning text-dark' : 'bg-success'}">${t.type === 'order' ? 'Purchase' : 'Payment'}</span></td>
          <td>${t.reference}</td>
          <td class="text-danger">${t.debit > 0 ? formatCurrency(t.debit) : '-'}</td>
          <td class="text-success">${t.credit > 0 ? formatCurrency(t.credit) : '-'}</td>
          <td class="${t.balance > 0 ? 'text-danger fw-bold' : 'text-success fw-bold'}">${formatCurrency(t.balance)}</td>
        </tr>`).join('');

      area.innerHTML = `
        <div class="form-card mb-3">
          <div class="row">
            <div class="col-md-4">
              <small class="text-muted">Vendor</small>
              <div class="fw-bold">${data.vendor.name}</div>
            </div>
            <div class="col-md-4">
              <small class="text-muted">Opening Balance</small>
              <div class="fw-bold">${formatCurrency(data.opening_balance)}</div>
            </div>
            <div class="col-md-4">
              <small class="text-muted">Closing Balance (Due)</small>
              <div class="fw-bold fs-5 ${data.closing_balance > 0 ? 'text-danger' : 'text-success'}">${formatCurrency(data.closing_balance)}</div>
            </div>
          </div>
        </div>
        <div class="data-table">
          <table class="table table-hover">
            <thead><tr><th>Date</th><th>Type</th><th>Reference</th><th>Debit (Purchase)</th><th>Credit (Payment)</th><th>Balance</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }
  </script>
</body>
</html>
